<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST VOZ SK</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #1a0a3a; color: white; max-width: 400px; margin: 0 auto; }
h2 { color: #c084fc; font-size: 16px; }
button { width: 100%; padding: 14px; margin: 6px 0; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
.btn-test { background: #7c3aed; color: white; }
.btn-ok  { background: #059669; color: white; }
.btn-bad { background: #dc2626; color: white; }
#log { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 12px; line-height: 1.6; min-height: 80px; white-space: pre-wrap; }
select, input { width: 100%; padding: 8px; margin: 6px 0; border-radius: 8px; border: none; font-size: 14px; box-sizing: border-box; }
label { font-size: 12px; color: #c084fc; }
hr { border-color: rgba(255,255,255,0.2); margin: 16px 0; }
</style>
</head>
<body>
<h2>🎤 TEST DE VOZ — BINGO PRO</h2>
<p style="font-size:12px;color:#9ca3af;">Abre este archivo en el móvil Android y prueba cada botón. Anota qué falla.</p>

<label>Idioma de voz:</label>
<select id="sel-lang">
  <option value="es-ES">Español (es-ES)</option>
  <option value="en-US">Inglés (en-US)</option>
  <option value="sk-SK" selected>Eslovaco (sk-SK)</option>
</select>

<label>Texto personalizado:</label>
<input type="text" id="txt-custom" value="Bingo">

<hr>
<button class="btn-test" onclick="testTexto('BINGO')">▶ Decir "BINGO" (mayúsculas)</button>
<button class="btn-test" onclick="testTexto('Bingo')">▶ Decir "Bingo" (minúsculas)</button>
<button class="btn-test" onclick="testTexto('bingo')">▶ Decir "bingo" (todo minúsculas)</button>
<button class="btn-test" onclick="testTexto('Bingo! Máme bingo! Gratulujeme!')">▶ Frase completa SK</button>
<button class="btn-test" onclick="testSeparado()">▶ Dos utterances separados (700ms)</button>
<button class="btn-test" onclick="testCustom()">▶ Decir texto personalizado</button>
<button class="btn-bad" onclick="speechSynthesis.cancel()">⏹ Parar voz</button>

<hr>
<h2 style="font-size:14px;">Voces disponibles en este dispositivo:</h2>
<button class="btn-ok" onclick="listarVoces()">🔍 Listar voces</button>

<div id="log">Pulsa un botón para probar...</div>

<script>
const log = document.getElementById('log');
function addLog(msg) { log.textContent += '\n' + msg; log.scrollTop = log.scrollHeight; }

function getLang() { return document.getElementById('sel-lang').value; }

function hablar(txt, lang) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = lang || getLang();
    u.rate = 0.85; u.pitch = 1.3;
    // Buscar voz
    const voces = speechSynthesis.getVoices();
    const code = u.lang.split('-')[0];
    const voz = voces.find(v => v.lang.startsWith(code)) || null;
    if (voz) { u.voice = voz; addLog('Voz: ' + voz.name + ' (' + voz.lang + ')'); }
    else { addLog('⚠ Sin voz para ' + u.lang + ' — usando default'); }
    u.onstart = () => addLog('▶ Hablando: "' + txt + '"');
    u.onend   = () => addLog('✅ Fin');
    u.onerror = (e) => addLog('❌ Error: ' + e.error);
    speechSynthesis.speak(u);
}

function testTexto(txt) {
    log.textContent = '--- TEST: "' + txt + '" lang=' + getLang() + ' ---';
    hablar(txt);
}

function testSeparado() {
    log.textContent = '--- TEST: Dos utterances separados ---';
    const lang = getLang();
    const voces = speechSynthesis.getVoices();
    const code = lang.split('-')[0];
    const voz = voces.find(v => v.lang.startsWith(code)) || null;

    speechSynthesis.cancel();
    const u1 = new SpeechSynthesisUtterance('Bingo');
    u1.lang = lang; u1.rate = 0.85; u1.pitch = 1.3;
    if (voz) u1.voice = voz;
    u1.onstart = () => addLog('▶ Utterance 1: "Bingo"');
    u1.onend   = () => { addLog('✅ Fin utterance 1'); };

    const u2 = new SpeechSynthesisUtterance('Máme bingo! Gratulujeme!');
    u2.lang = lang; u2.rate = 0.85; u2.pitch = 1.3;
    if (voz) u2.voice = voz;
    u2.onstart = () => addLog('▶ Utterance 2: "Máme bingo! Gratulujeme!"');
    u2.onend   = () => addLog('✅ Fin utterance 2');

    speechSynthesis.speak(u1);
    setTimeout(() => speechSynthesis.speak(u2), 700);
    addLog('Voz usada: ' + (voz ? voz.name : 'default'));
}

function testCustom() {
    const txt = document.getElementById('txt-custom').value;
    log.textContent = '--- TEST CUSTOM: "' + txt + '" ---';
    hablar(txt);
}

function listarVoces() {
    log.textContent = '--- VOCES DISPONIBLES ---';
    const voces = speechSynthesis.getVoices();
    if (!voces.length) {
        addLog('⚠ Sin voces aún. Esperando...');
        speechSynthesis.addEventListener('voiceschanged', () => {
            const v2 = speechSynthesis.getVoices();
            v2.forEach((v,i) => addLog(i+': '+v.name+' ('+v.lang+')' + (v.default?' ★':'')));
        }, {once: true});
        return;
    }
    voces.forEach((v,i) => addLog(i+': '+v.name+' ('+v.lang+')' + (v.default?' ★':'')));
    addLog('Total: ' + voces.length + ' voces');
}

// Auto-listar al cargar
window.addEventListener('load', () => {
    addLog('Dispositivo: ' + navigator.userAgent.substring(0,60));
    addLog('speechSynthesis: ' + ('speechSynthesis' in window ? '✅' : '❌'));
    setTimeout(listarVoces, 500);
});
</script>
</body>
</html>
